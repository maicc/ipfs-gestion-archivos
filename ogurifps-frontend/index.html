<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subida por Chunks (Zero-RAM)</title>
    <style>
        body { font-family: system-ui, sans-serif; padding: 2rem; max-width: 600px; margin: 0 auto; }
        .box { border: 2px dashed #ccc; padding: 20px; text-align: center; margin-bottom: 20px; border-radius: 8px; }
        progress { width: 100%; height: 25px; margin-top: 15px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:disabled { background: #ccc; }
    </style>
</head>
<body>
    <h2>Prueba de Subida por Chunks</h2>
    
    <div class="box">
        <input type="file" id="fileInput" accept="video/x-matroska, video/mp4, video/*">
        <br><br>
        <button id="uploadBtn" onclick="startUpload()">Subir a IPFS</button>
    </div>

    <progress id="progressBar" value="0" max="100"></progress>
    <p id="statusText">Esperando archivo...</p>

    <script src="upload.js"></script>
</body>
</html>
